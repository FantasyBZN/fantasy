name: Sincronizador Cartola FC

on:
  schedule:
    # Roda de hora em hora (no minuto 0)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Permite rodar manualmente clicando em um botão no GitHub

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install requests

      - name: Executar Script de Sincronização
        run: |
          python sync_cartola.py

      - name: Salvar Dados no Repositório
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/
          git diff-index --quiet HEAD || (git commit -m "Atualização automática de dados do Cartola FC" && git push)
